# Disability Discovery Crawler Configuration
# Copy this file to config.yaml and customize as needed

# Crawling settings
crawling:
  max_concurrent_sources: 3
  rate_limit_multiplier: 1.0  # Multiply all rate limits by this value
  timeout_seconds: 30
  user_agent: "DisabilityAIDiscoveryCrawler/1.0 (+https://disability-ai-collective.org)"
  
  # Content fetching
  fetch_full_content: true
  max_content_length: 5000  # characters
  min_confidence_threshold: 0.3
  
  # Database
  db_path: "disability_findings.db"
  keep_history_days: 90  # Auto-clean old findings after this many days

# Output settings
output:
  json_path: "disability_findings.json"
  report_path: "disability_report.md"
  export_format: "both"  # json, markdown, or both
  
  # Report options
  include_statistics: true
  include_top_findings: 10
  group_by_source: true
  
  # JSON options
  pretty_print: true
  include_raw_content: false  # Warning: increases file size

# Analysis settings
analysis:
  # Keyword matching
  keyword_min_length: 3
  keyword_case_sensitive: false
  enable_partial_matches: true
  
  # Pattern matching
  enable_pattern_matching: true
  pattern_confidence_boost: 1.3
  
  # Scoring
  title_weight: 1.5
  summary_weight: 1.2
  content_weight: 1.0
  frequency_boost: 0.1  # Per occurrence
  
  # Context generation
  max_context_length: 200
  include_pattern_descriptions: true

# Article generation
article_generation:
  # Title generation
  max_title_length: 100
  include_original_topic: true
  
  # Angle generation  
  angle_templates_per_category: 5
  randomize_templates: true
  
  # Research questions
  questions_per_article: 3
  customize_with_context: true
  
  # Agent assignment
  agents:
    - "Tech Accessibility Analyst"
    - "Inclusive Design Researcher"
    - "Disability Policy Expert"
    - "Assistive Technology Specialist"
    - "Neurodiversity Advocate"
    - "Universal Design Consultant"
    - "Disability Culture Critic"
    - "Accessibility Engineer"
  
  assignment_strategy: "random"  # random, round_robin, by_category

# Sources (override or extend in your config.yaml)
# Note: The main script has pre-configured sources
# Add your custom sources here:

# custom_sources:
#   - name: "My Tech Blog"
#     rss_url: "https://example.com/feed"
#     category: "tech"
#     rate_limit_seconds: 5
#     enabled: true
#     keywords_boost:
#       AI: 1.2
#       tech: 1.1

# Custom keywords (add to default set)
# custom_keywords:
#   my_keyword: 0.7
#   another_term: 0.8

# Custom patterns (regex)
# custom_patterns:
#   - "my pattern.*here"
#   - "another.*pattern"

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "crawler.log"
  max_file_size_mb: 10
  backup_count: 3
  
  # Console output
  console: true
  colors: true
  
  # Database logging
  log_to_db: false

# Monitoring
monitoring:
  enable_health_checks: true
  check_interval_minutes: 60
  
  # Alert thresholds
  max_error_rate: 0.2  # 20%
  min_findings_per_run: 1
  max_run_time_minutes: 30
  
  # Notifications (future feature)
  # notify_on_failure: false
  # notification_email: ""
  # notification_webhook: ""

# Advanced settings (usually don't need to change)
advanced:
  # HTTP settings
  max_retries: 3
  retry_delay_seconds: 5
  follow_redirects: true
  verify_ssl: true
  
  # Database
  vacuum_on_startup: false
  journal_mode: "WAL"
  
  # Memory management
  max_cached_articles: 1000
  cache_ttl_seconds: 3600
  
  # Performance
  use_connection_pool: true
  pool_size: 10
  pool_ttl_seconds: 300

# Scheduled runs (cron format)
# schedule:
#   daily_at_2am: "0 2 * * *"
#   hourly: "0 * * * *"
#   every_6_hours: "0 */6 * * *"

# Integration hooks (future feature)
# hooks:
#   on_finding_saved: ""
#   on_crawl_complete: ""
#   on_error: ""

