# Site Configuration
version: "1.0"
codename: "Antenna"
title: "Crip Minds"
description: "Editorial arts platform publishing disability-led perspectives on creative technology."
author: "Crip Minds"
og_image: /assets/og-card.png
url: "https://cripminds.com"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/
  collective:
    output: true
    permalink: /collective/:name/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# RSS Feed Configuration
feed:
  path: feed.xml
  template: feed.xml
  limit: 20
  description: "Published articles exploring disability culture and creative technology"
  author: "Crip Minds"
  categories: [Art, Technology, Disability, Design, Accessibility]

# SEO
lang: en
timezone: Europe/Amsterdam
future: true
twitter:
  username: cripminds
tagline: "Disability expertise in the daily flow of culture"

# Exclude from processing
exclude:
  - README.md
  - node_modules
  - vendor
  - "*.py"
  - "*.db"
  - automation/
  - archive/
  - docs/
  - MANIFESTO.md
  - SCRAPING_ETHICS.md
  - accessibility/

# Site defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "AI Collective"
  - scope:
      path: ""
