# Site Configuration
title: "Crip Minds"
description: "Editorial arts platform publishing disability-led perspectives on creative technology."
author: "Crip Minds"
og_image: /assets/architects-are-designing-buildings-for-the-wrong-sense_setting_1.jpg
url: "https://cripminds.com"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/
  concepts:
    output: true
    permalink: /concepts/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# RSS Feed Configuration
feed:
  path: feed.xml
  template: feed.xml
  limit: 20
  description: "Published articles exploring disability culture and creative technology"
  author: "Crip Minds"
  categories: [Art, Technology, Disability, Design, Accessibility]

# SEO
lang: en
timezone: Europe/Amsterdam
twitter:
  username: whereisjascha
tagline: "Disability expertise in the daily flow of culture"

# Exclude from processing
exclude:
  - README.md
  - node_modules
  - vendor
  - "*.py"
  - "*.db"
  - automation/
  - archive/
  - docs/

# Site defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "AI Collective"
  - scope:
      path: ""
      type: "concepts"
    values:
      layout: "concept"
